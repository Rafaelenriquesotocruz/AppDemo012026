<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TripApp | Encuentra los mejores viajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">


    <header th:insert="~{fragments/menu :: menu-principal}"></header>


    <div class="container py-5">

        <div class="text-center mb-4" th:if="${mensaje1}">
            <h2 class="text-success" th:text="${mensaje1}">¡Bienvenido a AppTrip!</h2>
        </div>

        <div class="text-center mb-5">
            <h1 class="display-4">Encuentra los mejores Trips en El Salvador</h1>
            <p class="lead">Puedes buscar por descripción y categoría.</p>
        </div>

        <div class="row justify-content-center mb-5">
            <div class="col-md-8">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Escriba una búsqueda">
                    <select class="form-select" style="max-width: 200px;">
                        <option selected>Todas las categorías</option>
                        <option>Aventura</option>
                        <option>Gastronomía</option>
                        <option>Naturaleza</option>
                    </select>
                    <button class="btn btn-primary">Buscar</button>
                </div>
            </div>
        </div>

        <h2 class="text-center mb-4 fw-bold">TRIPS DESTACADOS</h2>

        <div th:each="trip : ${viajes}" class="row mb-5 align-items-center bg-white p-4 rounded shadow">
            <div class="col-md-3 text-center">
                <img th:src="@{'/images/' + ${trip.imagen}}" 
                     alt="Imagen del viaje" 
                     class="img-fluid rounded"
                     style="max-height: 150px; width: auto;">
            </div>
            <div class="col-md-9">
                <h3 class="text-primary" th:text="${trip.nombre}">Rapel en Volcatenando</h3>
                <p><strong>Categoría:</strong> Aventura</p>
                <p><strong>Publicado:</strong> 
                    <span th:text="${#dates.format(trip.fecha, 'EEE MMM dd HH:mm:ss z yyyy')}">
                        Mon Jan 10 00:05:00 CST 2022
                    </span>
                </p>
                <p th:text="${trip.descripcion}">Hacer rapel en los circuitos de Volcatenango</p>
                <a class="btn btn-primary" th:href="@{/trips/view/__${trip.id}__}">Ver detalles →</a>
            </div>
        </div>

    </div>


    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
