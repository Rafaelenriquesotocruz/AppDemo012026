<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mensaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3 class="text-center">Operación Exitosa</h3>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-success">
                            <h4 class="alert-heading">¡Bien hecho!</h4>
                            <p th:text="${mensaje}">La operación se completó correctamente.</p>
                            <hr>
                            <p class="mb-0">Puedes continuar navegando.</p>
                        </div>
                        <div class="text-center">
                            <a href="/categorias/index" class="btn btn-primary">Volver a categorías</a>
                            <a href="/tabla" class="btn btn-secondary">Ver viajes</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
