<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trips en El Salvador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div class="container mt-4">
        <h1 class="text-center">Trips en El Salvador</h1>

        <table class="table table-striped table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Foto</th>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Fecha publicación</th>
                    <th>Costo</th>
                    <th>Descripción</th>
                    <th>Destacado</th>
                    <th>Detalle</th>
                    <th>Eliminar</th>   
                </tr>
            </thead>
            <tbody>
                <tr th:each ="trip : ${trips}">
                    
                    <td>
                        <img th:src="@{'/images/' + ${trip.imagen}}" 
                             alt="Imagen" 
                             width="50"
                             onerror="this.src='/images/no-image.png'">
                    </td>
                    <td th:text="${trip.id}"></td>
                    <td th:text="${trip.nombre}"></td>
                    <td th:text="${#dates.format(trip.fecha, 'dd/MM/yyyy')}"></td>
                    <td th:text="${trip.costo}"></td>
                    <td th:text="${trip.descripcion}"></td>
                    <td>
                        <span th:if="${trip.destacado == 1}" class="badge bg-success">Sí</span>
                        <span th:unless="${trip.destacado == 1}" class="badge bg-danger">No</span>
                    </td>
                    <td>
                        
                        <a th:href="@{/trips/view/__${trip.id}__}" 
                           class="btn btn-info btn-sm">
                            Detalle
                        </a>
                    </td>
                    <td>
                        
                        <a th:href="@{/trips/delete(id=${trip.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Estás seguro de eliminar este viaje?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>


    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
