<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Trips</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div th:if="${mensajeExito}" class="container mt-3">
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>¡Éxito!</strong> <span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Lista de Trips en El Salvador</h1>

        <table class="table table-striped table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Detalles</th>
                    <th>Fecha</th>
                    <th>Costo</th>
                    <th>Destacado</th>
                    <th>Categoría</th>
                    <th>Imagen</th>
                    <th>Acciones</th>
                 </thead>
            <tbody>
                <tr th:each="trip : ${trips}">
                    <td th:text="${trip.id}">1</td>
                    <td th:text="${trip.nombre}">Rapel</td>
                    <td th:text="${trip.descripcion}">Descripción</td>
                    <td th:text="${trip.detalles}">Detalles</td>
                    <td th:text="${#dates.format(trip.fecha, 'dd/MM/yyyy')}">01/01/2022</td>
                    <td th:text="${trip.costo}">0.0</td>
                    <td>
                        <span th:if="${trip.destacado == 1}" class="badge bg-success">Sí</span>
                        <span th:unless="${trip.destacado == 1}" class="badge bg-danger">No</span>
                    </td>
                    <td th:text="${trip.categoria != null ? trip.categoria.nombre : 'Sin categoría'}">Aventura</td>
                    <td>
                        <img th:src="@{'/images/' + ${trip.imagen}}" alt="Imagen" width="50">
                    </td>
                    <td class="d-flex gap-2">
                        <a th:href="@{/trips/view/__${trip.id}__}" class="btn btn-info btn-sm">Ver</a>
                        <a th:href="@{/trips/delete(id=${trip.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar este viaje?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="text-center mt-3">
            <a href="/trips/create" class="btn btn-primary">Crear Nuevo Trip</a>
            <a href="/" class="btn btn-secondary">Volver al inicio</a>
        </div>
    </div>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
