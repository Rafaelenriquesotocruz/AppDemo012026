<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4" th:text="${categoria.id != null} ? 'Editar Categoría' : 'Nueva Categoría'">
            Formulario de Categoría
        </h1>
        
        <form th:action="@{/categorias/save}" th:object="${categoria}" method="post" class="card p-4">
            <input type="hidden" th:field="*{id}" />
            
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre de la Categoría:</label>
                <input type="text" th:field="*{nombre}" class="form-control" id="nombre" required />
                <div class="form-text">Ejemplo: Aventura, Playa, Gastronomía, etc.</div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/categorias/index}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
